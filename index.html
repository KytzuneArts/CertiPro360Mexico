<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CERTIPRO 360 · Certificación Profesional</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#ffffff;--bg2:#f5f6fa;
  --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.14);
  --gold:#cfa935;--gold2:#e0bc4a;--gold3:#f0d47a;
  --wine:#7e1611;--wine2:#a01e18;
  --white:#1a1e2e;--muted:#5a6380;--muted2:#9aa3be;
  --green:#16a34a;--r:16px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--white);font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;line-height:1.6;overflow-x:hidden}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--gold),var(--wine));border-radius:2px}

/* ── WHATSAPP FLOTANTE ── */
.wa-float{position:fixed;bottom:28px;right:28px;z-index:999;display:flex;align-items:center;gap:10px;background:#25d366;color:#fff;font-size:13px;font-weight:700;padding:14px 20px 14px 16px;border-radius:12px;transition:all .25s;box-shadow:0 8px 32px rgba(37,211,102,.4);text-decoration:none}
.wa-float:hover{transform:translateY(-3px) scale(1.04);box-shadow:0 12px 40px rgba(37,211,102,.5)}
.wa-float svg{width:26px;height:26px;flex-shrink:0}
@keyframes waPulse{0%,100%{box-shadow:0 8px 32px rgba(37,211,102,.4)}50%{box-shadow:0 8px 48px rgba(37,211,102,.65)}}
@media(max-width:480px){.wa-float span{display:none}.wa-float{padding:14px}}

/* ── URGENCY BANNER ── */
.urgency-bar{background:linear-gradient(135deg,var(--wine),var(--wine2));color:#fff;text-align:center;padding:10px 20px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px}
.urgency-bar strong{color:var(--gold2)}
.countdown{display:flex;gap:6px;align-items:center}
.cd-block{background:rgba(255,255,255,.15);border-radius:6px;padding:3px 8px;font-family:'DM Mono',monospace;font-size:14px;font-weight:700;min-width:36px;text-align:center}
.cd-sep{font-weight:700;color:var(--gold2);font-size:16px}

/* ── NAV ── */
nav{position:fixed;top:36px;left:0;right:0;z-index:300;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;transition:all .35s}
nav.scrolled{background:rgba(255,255,255,.97);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);box-shadow:0 4px 32px rgba(0,0,0,.08);top:0}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-right{display:flex;align-items:center;gap:6px}
.nav-link{font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;padding:8px 14px;border-radius:8px;transition:all .2s;display:none;position:relative}
.nav-link::after{content:'';position:absolute;bottom:4px;left:50%;right:50%;height:1px;background:var(--wine);transition:all .25s}
.nav-link:hover{color:var(--wine)}
.nav-link:hover::after{left:14px;right:14px}
@media(min-width:768px){.nav-link{display:block}}
.nav-btn{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.1em;padding:10px 22px;border-radius:10px;background:linear-gradient(135deg,var(--wine),var(--wine2));color:#fff;border:none;cursor:pointer;text-decoration:none;transition:all .2s;display:flex;align-items:center;gap:6px}
.nav-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(126,22,17,.25)}
.nav-dot{width:4px;height:4px;border-radius:50%;background:var(--wine);position:absolute;bottom:6px;left:50%;transform:translateX(-50%);opacity:0;transition:opacity .2s}
.nav-link.active .nav-dot{opacity:1}
.nav-link.active{color:var(--wine)}

/* ── HERO ── */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:120px 24px 80px;text-align:center;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;pointer-events:none}
.hero-bg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(207,169,53,.08) 0%,transparent 65%),radial-gradient(ellipse 50% 50% at 15% 85%,rgba(126,22,17,.07) 0%,transparent 60%)}
.hero-grid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(0,0,0,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.04) 1px,transparent 1px);background-size:100px 100px}
.orb{position:absolute;border-radius:50%;filter:blur(60px);pointer-events:none;animation:float linear infinite}
.orb1{width:300px;height:300px;background:rgba(207,169,53,.08);top:10%;left:5%;animation-duration:18s}
.orb2{width:200px;height:200px;background:rgba(126,22,17,.07);bottom:20%;right:8%;animation-duration:14s;animation-delay:-7s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-30px)}}
.hero-badge{display:inline-flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;color:var(--wine);background:rgba(126,22,17,.07);border:1px solid rgba(126,22,17,.15);padding:8px 16px;border-radius:40px;margin-bottom:20px;animation:fadeUp .6s ease both}
.hero-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--wine);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.5)}}
.hero-title{font-size:clamp(32px,5.5vw,64px);font-weight:800;line-height:1.05;letter-spacing:-.03em;color:var(--white);margin-bottom:12px;animation:fadeUp .6s .1s ease both;position:relative;z-index:1}
.hero-title .wine{color:var(--wine)}
.hero-title .line{position:relative;display:inline-block}
.hero-title .line::after{content:'';position:absolute;bottom:-6px;left:0;right:0;height:3px;border-radius:2px;background:linear-gradient(90deg,var(--gold),var(--wine),transparent)}
.hero-sub{font-size:clamp(15px,2vw,18px);color:var(--muted);max-width:620px;line-height:1.75;margin:22px auto 38px;animation:fadeUp .6s .18s ease both;position:relative;z-index:1}
.hero-sub strong{color:var(--white);font-weight:600}
.hero-actions{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;animation:fadeUp .6s .26s ease both;position:relative;z-index:1}
.btn-primary{font-size:15px;font-weight:700;padding:18px 40px;border-radius:var(--r);background:linear-gradient(135deg,var(--wine),var(--wine2));color:#fff;border:none;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:12px;transition:all .25s}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 10px 40px rgba(126,22,17,.32)}
.btn-primary .btn-arrow{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:12px;transition:transform .25s}
.btn-primary:hover .btn-arrow{transform:translateX(3px)}
.btn-ghost{font-size:15px;font-weight:600;padding:17px 30px;border-radius:var(--r);border:1px solid var(--border2);color:var(--muted);background:transparent;cursor:pointer;text-decoration:none;transition:all .25s;display:inline-flex;align-items:center;gap:8px}
.btn-ghost:hover{border-color:var(--wine);color:var(--wine);background:rgba(126,22,17,.04)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* CERT CARDS HERO */
.cert-cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:36px;animation:fadeUp .6s .3s ease both;position:relative;z-index:1}
.cert-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:20px 22px;text-align:left;width:215px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.cert-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.cert-card.ec0366::before{background:linear-gradient(90deg,var(--wine),var(--gold))}
.cert-card.ec0301::before{background:linear-gradient(90deg,var(--gold),#e8a020)}
.cert-card.ec0217::before{background:linear-gradient(90deg,var(--wine2),var(--wine))}
.cert-card.ec076::before{background:linear-gradient(90deg,#2a6bcc,#1a4a99)}
.cert-card:hover{transform:translateY(-5px);box-shadow:0 14px 36px rgba(0,0,0,.12);border-color:rgba(126,22,17,.2)}
.cert-card-code{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;color:var(--wine);margin-bottom:6px;text-transform:uppercase;font-weight:600}
.cert-card-name{font-size:13px;font-weight:700;color:var(--white);margin-bottom:8px;line-height:1.3}
.cert-card-desc{font-size:11px;color:var(--muted);line-height:1.55;margin-bottom:10px}
.cert-card-cta{font-size:11px;font-weight:700;color:var(--wine);display:flex;align-items:center;gap:5px}
.cert-card-cta::after{content:'→';transition:transform .2s}
.cert-card:hover .cert-card-cta::after{transform:translateX(4px)}
.hero-stats{display:flex;margin-top:36px;animation:fadeUp .6s .38s ease both;position:relative;z-index:1;background:#fff;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.05)}
.hstat{padding:16px 28px;text-align:center;border-right:1px solid var(--border);flex:1;transition:background .2s}
.hstat:last-child{border-right:none}
.hstat:hover{background:rgba(207,169,53,.06)}
.hstat-val{font-size:clamp(18px,2.5vw,26px);font-weight:800;color:var(--wine);line-height:1;letter-spacing:-.02em}
.hstat-key{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-top:4px}
.professions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:24px;animation:fadeUp .6s .44s ease both;position:relative;z-index:1}
.prof-chip{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:500;color:var(--muted);background:#fff;border:1px solid var(--border);padding:7px 14px;border-radius:40px;transition:all .2s}
.prof-chip:hover{border-color:rgba(126,22,17,.3);color:var(--wine);background:rgba(126,22,17,.04);transform:translateY(-2px)}

/* ── SECTIONS BASE ── */
.sec{padding:100px 24px;position:relative;z-index:1}
.container{max-width:1100px;margin:0 auto}
.sec-tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--wine);display:flex;align-items:center;gap:10px;margin-bottom:16px}
.sec-tag::before{content:'';width:24px;height:1px;background:linear-gradient(to right,var(--wine),transparent)}
.sec-h{font-size:clamp(28px,4.5vw,50px);font-weight:800;letter-spacing:-.025em;line-height:1.08;color:var(--white);margin-bottom:16px}
.sec-h .gold{color:var(--gold)}.sec-h .wine{color:var(--wine)}
.sec-p{font-size:15px;color:var(--muted);line-height:1.8;max-width:540px}
.rev{opacity:0;transform:translateY(32px);transition:opacity .7s cubic-bezier(.16,1,.3,1),transform .7s cubic-bezier(.16,1,.3,1)}
.rev.in{opacity:1;transform:none}
.rev.d1{transition-delay:.1s}.rev.d2{transition-delay:.2s}.rev.d3{transition-delay:.3s}.rev.d4{transition-delay:.4s}

/* ── ABOUT ── */
.about-sec{background:var(--bg2)}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center}
@media(max-width:768px){.about-grid{grid-template-columns:1fr;gap:40px}}
.about-img-wrap{position:relative;border-radius:24px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.12);border:1px solid rgba(207,169,53,.25)}
.about-img-wrap img{width:100%;height:auto;object-fit:contain;display:block}
.about-img-badge{position:absolute;bottom:20px;left:20px;right:20px;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:12px}
.aib-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--wine),var(--gold));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.aib-text strong{display:block;font-size:14px;font-weight:700;color:var(--white)}
.aib-text span{font-size:12px;color:var(--muted)}
.about-quote{font-size:clamp(17px,2.2vw,21px);font-weight:700;line-height:1.4;color:var(--white);padding:32px;border-radius:20px;background:#fff;border:1px solid var(--border);border-left:3px solid var(--wine);position:relative}
.about-quote::before{content:'"';position:absolute;top:-16px;left:20px;font-size:100px;line-height:1;color:var(--wine);opacity:.07;font-family:Georgia,serif}
.about-quote span{color:var(--wine)}
.about-quote .attr{display:block;margin-top:14px;font-size:12px;color:var(--muted);font-style:italic;font-family:'DM Mono',monospace;letter-spacing:.05em}
.about-points{display:flex;flex-direction:column;gap:12px}
.about-point{display:flex;gap:14px;align-items:flex-start;padding:20px;border-radius:var(--r);background:#fff;border:1px solid var(--border);transition:all .25s;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.about-point:hover{border-color:rgba(126,22,17,.2);transform:translateX(4px)}
.ap-icon{width:44px;height:44px;border-radius:12px;background:rgba(126,22,17,.08);border:1px solid rgba(126,22,17,.15);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ap-text h4{font-size:14px;font-weight:700;color:var(--white);margin-bottom:4px}
.ap-text p{font-size:13px;color:var(--muted);line-height:1.6}

/* ── PROMO ── */
.promo-sec{background:var(--bg);padding:0 24px 80px}
.promo-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:1100px;margin:0 auto}
@media(max-width:700px){.promo-grid{grid-template-columns:1fr}}
.promo-img{border-radius:20px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.1);border:1px solid var(--border);transition:all .35s;position:relative}
.promo-img:hover{transform:translateY(-5px);box-shadow:0 22px 60px rgba(126,22,17,.15);border-color:rgba(207,169,53,.3)}
.promo-img img{width:100%;height:auto;object-fit:contain;display:block;transition:transform .5s}
.promo-img:hover img{transform:scale(1.02)}
.promo-img-label{position:absolute;top:16px;left:16px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;background:rgba(126,22,17,.85);color:#fff;padding:6px 12px;border-radius:8px}

/* ── DIFF ── */
.diff-sec{background:var(--bg2)}
.diff-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:56px;position:relative}
@media(max-width:640px){.diff-grid{grid-template-columns:1fr}}
.diff-card{border-radius:20px;padding:36px 32px;position:relative;overflow:hidden;transition:transform .3s}
.diff-card.no{background:#fff;border:1px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,.05)}
.diff-card.yes{background:linear-gradient(145deg,#fdf5e8,#fff8ee);border:1px solid rgba(207,169,53,.35)}
.diff-card:hover{transform:translateY(-4px)}
.diff-tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:6px 16px;border-radius:20px;display:inline-block;margin-bottom:20px}
.diff-card.no .diff-tag{background:rgba(0,0,0,.05);color:var(--muted2)}
.diff-card.yes .diff-tag{background:rgba(126,22,17,.08);color:var(--wine);border:1px solid rgba(126,22,17,.2)}
.diff-card h3{font-size:22px;font-weight:800;margin-bottom:20px;line-height:1.2}
.diff-card.no h3{color:var(--muted)}
.diff-card.yes h3{color:var(--white)}
.diff-list{list-style:none;display:flex;flex-direction:column;gap:12px}
.diff-list li{font-size:14px;display:flex;align-items:flex-start;gap:12px;line-height:1.55}
.diff-card.no .diff-list li{color:var(--muted2)}
.diff-card.yes .diff-list li{color:var(--muted)}
.diff-marker{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:1px;font-weight:700}
.diff-card.no .diff-marker{background:rgba(0,0,0,.06);color:var(--muted2)}
.diff-card.yes .diff-marker{background:rgba(126,22,17,.1);color:var(--wine)}
.diff-cta{margin-top:24px;font-size:13px;font-weight:700;color:var(--wine);display:flex;align-items:center;gap:8px}
@media(min-width:641px){.diff-grid::before{content:'VS';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.25em;color:var(--wine);opacity:.3;font-weight:800;z-index:0}}

/* ── CERTIFICACIONES ── */
.certs-sec{background:var(--bg)}
.cert-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:56px}
@media(max-width:640px){.cert-grid{grid-template-columns:1fr}}
.cert-module{padding:30px 26px;border-radius:20px;background:#fff;border:1px solid var(--border);transition:all .3s;position:relative;overflow:hidden;cursor:default;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.cert-module::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;transform:scaleX(0);transform-origin:left;transition:transform .35s}
.cert-module.m1::after{background:linear-gradient(to right,var(--wine),var(--gold))}
.cert-module.m2::after{background:linear-gradient(to right,var(--gold),#e8a020)}
.cert-module.m3::after{background:linear-gradient(to right,var(--wine2),var(--wine))}
.cert-module.m4::after{background:linear-gradient(to right,#2a6bcc,#1a4a99)}
.cert-module:hover{border-color:rgba(126,22,17,.2);transform:translateY(-5px);box-shadow:0 16px 40px rgba(0,0,0,.1)}
.cert-module:hover::after{transform:scaleX(1)}
.cm-num{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--wine);margin-bottom:6px;font-weight:600}
.cm-title{font-size:18px;font-weight:700;color:var(--white);margin-bottom:5px;line-height:1.3}
.cm-hook{font-size:13px;color:var(--wine);font-weight:600;margin-bottom:12px;font-style:italic}
.cm-topics{display:flex;flex-direction:column;gap:7px}
.cm-topic{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;line-height:1.4}
.cm-topic::before{content:'·';color:var(--gold);font-weight:700;font-size:16px;line-height:1}
.cm-footer{display:flex;align-items:center;justify-content:space-between;margin-top:16px;flex-wrap:wrap;gap:10px}
.cm-badge{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:5px 12px;border-radius:6px;background:rgba(207,169,53,.1);color:var(--gold);border:1px solid rgba(207,169,53,.2)}
.cm-btn{font-size:12px;font-weight:700;color:var(--wine);display:flex;align-items:center;gap:5px;transition:gap .2s;cursor:pointer;text-decoration:none}
.cm-btn:hover{gap:9px}
.cert-banner-wrap{max-width:1100px;margin:40px auto 0;border-radius:24px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.12);border:1px solid rgba(207,169,53,.25);position:relative}
.cert-banner-wrap img{width:100%;display:block;object-fit:contain;height:auto}
.cert-banner-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(to right,rgba(126,22,17,.35) 0%,transparent 50%)}
.cert-banner-text{position:absolute;top:50%;left:40px;transform:translateY(-50%);z-index:2}
.cert-banner-text h3{font-size:clamp(18px,2.5vw,28px);font-weight:800;color:#fff;line-height:1.2;margin-bottom:8px}
.cert-banner-text p{font-size:13px;color:rgba(255,255,255,.8);max-width:300px}
.oficial-strip{display:grid;grid-template-columns:repeat(4,1fr);margin-top:20px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.05)}
@media(max-width:640px){.oficial-strip{grid-template-columns:1fr 1fr}}
.os-item{background:#fff;padding:22px 16px;text-align:center;border-right:1px solid var(--border);transition:background .2s}
.os-item:last-child{border-right:none}
.os-item:hover{background:rgba(126,22,17,.04)}
.os-val{font-size:24px;font-weight:800;color:var(--wine);line-height:1;margin-bottom:5px}
.os-key{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}

/* ── PRECIOS ── */
.pricing-sec{background:var(--bg2)}
.pricing-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-top:56px}
@media(max-width:640px){.pricing-grid{grid-template-columns:1fr}}
.price-card{background:#fff;border:1px solid var(--border);border-radius:24px;padding:36px 30px;position:relative;overflow:hidden;transition:all .3s;box-shadow:0 4px 16px
